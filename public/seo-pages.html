<html lang="en">
<head>

    :root {
      --bg:#0f0f14; --bg2:#18181f; --bg3:#22222c; --surface:#2a2a36;
      --border:#35354a; --text:#f0f0f8; --muted:#8888a8;

    body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

    header { position:sticky; top:0; z-index:100; background:rgba(15,15,20,0.9); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); }

    .logo-icon { width:34px; height:34px; border-radius:10px; background:linear-gradient(135deg,var(--accent),var(--accent4)); display:flex; align-items:center; justify-content:center; font-size:18px; }

    .page-hero p { color:var(--muted); font-size:16px; font-weight:600; margin-top:12px; line-height:1.7; }
    .updated-badge { display:inline-block; margin-top:16px; padding:4px 14px; border-radius:50px; background:rgba(108,99,255,0.15); border:1px solid rgba(108,99,255,0.3); color:var(--accent4); font-size:12px; font-weight:800; }

    /* CONTENT */
    .page-content { max-width:900px; margin:0 auto; padding:48px 24px 80px; }

    /* PROSE */
    .prose h2 { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; margin:40px 0 14px; padding-bottom:10px; border-bottom:1px solid var(--border); color:var(--text); }

    .prose p { color:var(--muted); font-size:15px; font-weight:600; line-height:1.9; margin-bottom:14px; }
    .prose a { color:var(--accent4); text-decoration:none; font-weight:700; }
    .prose a:hover { text-decoration:underline; }
    .prose ul, .prose ol { padding-left:24px; margin-bottom:16px; }
    .prose li { color:var(--muted); font-size:15px; font-weight:600; line-height:1.8; margin-bottom:6px; }
    .prose strong { color:var(--text); font-weight:800; }

    .contact-method-text h4 { font-size:14px; font-weight:800; margin-bottom:4px; }
    .contact-method-text p { color:var(--muted); font-size:13px; font-weight:600; line-height:1.6; }
    .contact-method-text a { color:var(--accent4); text-decoration:none; font-weight:700; }

    .contact-form { display:flex; flex-direction:column; gap:16px; }
    .form-group { display:flex; flex-direction:column; gap:6px; }
    .form-group label { font-size:13px; font-weight:800; color:var(--text); }

    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color:var(--accent4); }
    .form-group textarea { resize:vertical; min-height:130px; }
    .form-group select option { background:var(--bg2); }
    .submit-btn {

    .form-success { display:none; background:rgba(0,212,170,0.1); border:1px solid rgba(0,212,170,0.3); border-radius:var(--radius-sm); padding:16px 20px; color:var(--accent3); font-weight:700; font-size:14px; }

    .value-card { background:var(--bg2); border:1.5px solid var(--border); border-radius:var(--radius); padding:24px; }
    .value-icon { font-size:32px; margin-bottom:12px; display:block; }
    .value-card h3 { font-family:'Syne',sans-serif; font-size:15px; font-weight:800; margin-bottom:8px; }
    .value-card p { color:var(--muted); font-size:13px; font-weight:600; line-height:1.7; }

    /* FOOTER */
    footer { border-top:1px solid var(--border); background:var(--bg2); padding:28px 24px; }
    .footer-bottom { max-width:900px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; font-size:13px; color:var(--muted); font-weight:600; flex-wrap:wrap; gap:16px; }
    .footer-links { display:flex; gap:20px; flex-wrap:wrap; }
    .footer-links a { color:var(--muted); text-decoration:none; font-size:13px; font-weight:700; }
    .footer-links a:hover { color:var(--text); }

    .demo-switcher { position:fixed; bottom:20px; right:20px; z-index:999; background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); padding:12px; display:flex; flex-direction:column; gap:6px; }
    .demo-switcher span { font-size:10px; color:var(--muted); font-weight:800; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
    .demo-btn { padding:6px 12px; border-radius:6px; background:var(--surface); border:none; color:var(--text); font-family:'Nunito',sans-serif; font-size:12px; font-weight:800; cursor:pointer; text-align:left; transition:background .15s; }
    .demo-btn:hover, .demo-btn.active { background:var(--accent4); }
  </style>
</head>

                <label for="message">Message</label>
                <textarea id="message" placeholder="Tell us what's on your mind…" required></textarea>
              </div>
              <button type="submit" class="submit-btn">Send Message →</button>
              <div class="form-success" id="form-success">✅ Message sent! We'll get back to you within 2–3 business days.</div>
            </form>
          </div>`
      },

      // ── 5. FAQ ────────────────────────────────────────────────────
      faq: {
        title: 'FAQ | Casual Browser Games',
        meta: 'Frequently asked questions about Casual Browser Games. Learn how to play, what devices are supported, how ads work, and more.',
        hero: { icon:'❓', h1:'Frequently Asked Questions', sub:'Everything you need to know about Casual Browser Games.' },
        html: `
          <div class="faq-list" id="faq-list"></div>
          <div class="prose" style="margin-top:48px">
            <h2>Still have a question?</h2>
            <p>Can't find the answer you're looking for? <a href="/contact">Send us a message</a> and we'll get back to you within a couple of business days.</p>
          </div>`
      }
    };

    const FAQS = [
      { q:'Are the games really free?', a:'Yes, 100%. Every game on Casual Browser Games is completely free to play. We are supported by non-intrusive display advertising and in-game ads from our game distribution partners. You will never be asked to pay or create an account.' },
      { q:'Do I need to download anything?', a:'Never. All games run directly in your web browser using HTML5 technology. There is nothing to install, no plugins required, and no app store needed. Just click a game and it starts within seconds.' },
      { q:'Do I need to create an account to play?', a:'No account is required. You can play any game on the site without registering or signing in. Just visit the site and start playing. In the future we may offer optional accounts for features like saving progress and leaderboards.' },
      { q:'What devices are supported?', a:'Most games work on desktop computers (Windows, Mac, Linux), tablets, and modern smartphones. Games are built in HTML5, which is supported by all modern browsers including Chrome, Firefox, Safari, and Edge. For the best experience on action games, we recommend a desktop with a keyboard.' },
      { q:'Why do I see ads?', a:'Ads are how we keep the site free for everyone. We show display ads on the site and our game distribution partners show ads within some games. We try to keep advertising non-intrusive. If you encounter an ad that is inappropriate or malicious, please report it to us immediately via the contact page.' },
      { q:'A game isn\'t loading. What should I do?', a:'Try refreshing the page first. If it still doesn\'t load, try: clearing your browser cache, disabling your ad blocker (some blockers also block game scripts), or trying a different browser. If the problem persists, please let us know via the <a href="/contact">contact page</a> with the game name and your browser version.' },
      { q:'Can I suggest a game to add?', a:'Absolutely! We love hearing suggestions. Use the <a href="/contact">contact form</a> and select "Suggest a new game". Let us know the game name and a link if you have one. We\'ll review it and add it to the catalog if it meets our quality standards.' },
      { q:'Are your games safe for children?', a:'We curate all games on the site and aim for content suitable for ages 13 and above. We do not host violent, adult, or inappropriate content. However, parents should be aware that games are ad-supported and some ads may not always be perfectly age-appropriate. Parental supervision is always recommended for younger users.' },
      { q:'Can I embed your games on my own website?', a:'The games on our site are licensed from third-party game networks (GameDistribution, Famobi, etc.). You would need to apply directly to those networks to embed their games. You may not embed our site pages or scrape our content.' },
      { q:'How often do you add new games?', a:'We aim to add new games every week. To see the latest additions, check the "New Arrivals" section on the homepage. Our catalog currently features 500+ games across action, puzzle, racing, sports, idle, and more categories.' },
      { q:'How do I go fullscreen?', a:'On the game page, click the "⛶ Fullscreen" button below the game window. You can also press F11 in most browsers for a full browser fullscreen. Press Escape to exit fullscreen.' },
      { q:'I found a bug or security issue. Who do I tell?', a:'Please report bugs or security issues through our <a href="/contact">contact form</a>. For security issues, please include as much detail as possible. We take all reports seriously and will respond promptly.' },
    ];

    // ── PAGE RENDERING ──────────────────────────────────────────────
    function showPage(name) {
      const page = PAGES[name];
      if (!page) return;

      document.title = page.title;
      document.querySelectorAll('.demo-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().includes(name.slice(0,4))));

      const hero = page.hero;
      const heroHTML = `
        <div class="page-hero">
          <div class="page-hero-inner">
            <span class="page-icon">${hero.icon}</span>
            <h1>${hero.h1}</h1>
            <p>${hero.sub}</p>
            ${hero.badge ? `<span class="updated-badge">${hero.badge}</span>` : ''}
          </div>
        </div>`;

      let contentHTML = page.html;

      // Inject FAQ items
      if (name === 'faq') {
        const faqItems = FAQS.map((f,i) => `
          <div class="faq-item" id="faq-${i}">
            <div class="faq-q" onclick="toggleFAQ(${i})">
              <span>${f.q}</span>
              <span class="faq-icon">+</span>
            </div>
            <div class="faq-a">
              <div class="faq-a-inner">${f.a}</div>
            </div>
          </div>`).join('');
        contentHTML = contentHTML.replace('<div class="faq-list" id="faq-list"></div>',
          `<div class="faq-list">${faqItems}</div>`);
      }

      document.getElementById('app').innerHTML = heroHTML + `<div class="page-content">${contentHTML}</div>`;
    }

    function toggleFAQ(i) {
      const item = document.getElementById('faq-'+i);
      const wasOpen = item.classList.contains('open');
      document.querySelectorAll('.faq-item').forEach(el => el.classList.remove('open'));
      if (!wasOpen) item.classList.add('open');
    }

    function submitForm(e) {
      e.preventDefault();
      // In production: send to a backend API or Formspree / EmailJS
      document.getElementById('form-success').style.display = 'block';
      e.target.querySelector('button[type=submit]').disabled = true;
    }

    // Detect page from URL or default to FAQ for demo
    const pathMap = {
      '/privacy-policy': 'privacy', '/terms': 'terms',
      '/about': 'about', '/contact': 'contact', '/faq': 'faq'
    };
    const detectedPage = pathMap[window.location.pathname] || 'faq';
    showPage(detectedPage);
  </script>
</body>
</html>
